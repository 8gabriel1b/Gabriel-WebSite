<!DOCTYPE html>
<html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Blog</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>    
            <h1>Meu blog tech</h1>
            <p>Vou compartilhar conhecimento sobre tecnologia e programação</p>
        </header>
    <main>
        <article>
            <img src="imagen.blog.png" alt="Logotipo conceitual de tecnologia e educação: Um livro aberto de onde emerge um cérebro digital brilhante, cercado por icones de Wifi, circuitos e lampada de ideias. Cores tons de azul e Branco.">
            <div>
     <h2>Meu primeiro post</h2>
                <p class="artigo-autor">Por:Gabriel Rosa</p>
                <p>Boas vindas ao meu novo blog aqui vou compartilhar dicas de programação e curiosidades da area de tecnologia.</p>
                <button>❤️‍🩹 <span>0</span></button>
                <button>👏 <span>0</span></button>
            </div>           
        </article>
           
        </main>
    </body>
    <script>
        const botoes = document.querySelector("button");

        botoes.forEach( function(botao){
            botao.addEventListener("click", botaoClicado);

            function botaoClicado(){
                console.log("fui clicado")
                let texto = botao.querySelector("span");
                texto.textContent++;
            }
          }
        )

    </script>
</html>
